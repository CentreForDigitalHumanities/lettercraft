
query BrowseSourcesPage($ids: [String!]) {
    sources(ids: $ids) {
        id
        name
        descriptionText
        reference
        episodes {
            id
        }
    }
}

query BrowseEpisodesPage($ids: [String!]) {
    episodes(ids: $ids) {
        id
        name
        summary
        book
        chapter
        page
        source {
            id
            name
        }
        categories {
            id
            name
        }
        designators
        agents {
            id
            agent {
                id
                name
                isGroup
                identified
            }
        }
        gifts {
            id
            gift {
                id
                name
            }
        }
        letters {
            id
            letter {
                id
                name
            }
        }
        spaces {
            id
            space {
                id
                name
                hasIdentifiableFeatures
            }
        }
    }
}

