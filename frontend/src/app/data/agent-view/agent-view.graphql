query ViewAgent($id: ID!) {
  agentDescription(id: $id) {
    id
    name
    description
    editable
    isGroup
    identified
    source {
        id
        name
        descriptionText
        episodes {
            id
        }
    }
    episodes {
        id
        episode {
            id
            name
            summary
            book
            chapter
            page
            source {
                id
                name
            }
            categories {
                id
                name
            }
            designators
            agents {
                id
                agent {
                    id
                    name
                    isGroup
                    identified
                }
            }
            gifts {
                id
                gift {
                    id
                    name
                }
            }
            letters {
                id
                letter {
                    id
                    name
                }
            }
            spaces {
                id
                space {
                    id
                    name
                    hasIdentifiableFeatures
                }
            }

        }
    }
    gender {
        id
        gender
        sourceMention
        note
    }
    personReferences {
        id
        certainty
        note
        person {
            id
            name
        }
    }
    contributors {
        id
        fullName
    }
  }
}
