query ViewEpisode($id: ID!) {
  episode(id: $id) {
    id
    name
    editable
    source {
        id
        name
        descriptionText
        episodes {
            id
        }
    }
    book
    chapter
    page
    contributors {
        id
        fullName
    }
    summary
    designators
    categories {
        id
        name
    }
    agents {
        id
        agent {
            id
            name
            description
            isGroup
            identified
            episodes {
                id
            }

        }
    }
    locations {
        id
        location {
            id
            name
            hasIdentifiableFeatures
            description
            episodes {
                id
            }
        }
    }
    letters {
        id
        letter {
            id
            name
            description
            episodes {
                id
            }
        }
    }
    gifts {
        id
        gift {
            id
            name
            description
            episodes {
                id
            }
        }
    }
  }
}
