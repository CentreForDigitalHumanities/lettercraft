query ViewSource($id: ID!) {
    source(id: $id) {
        id
        name
        editable
        medievalTitle
        reference
        descriptionText
        image {
            id
            url
            altText
            caption
        }
        episodes {
            id
        }
        agents {
            id
        }
        letters {
            id
        }
        gifts {
            id
        }
        locations {
            id
        }
        contributors {
            id
            fullName
        }
    }
}

query ViewSourceEpisodesPage($ids: [String!]) {
    episodes(ids: $ids) {
        id
        name
        summary
        designators
        categories {
            id
            name
        }
        book
        chapter
        contributors {
            id
            fullName
        }
        page
        agents {
            id
            agent {
                id
                name
                isGroup
                identified
            }
        }
        gifts {
            id
            gift {
                id
                name
            }
        }
        letters {
            id
            letter {
                id
                name
            }
        }
        locations {
            id
            location {
                id
                name
                hasIdentifiableFeatures
            }
        }
    }
}
