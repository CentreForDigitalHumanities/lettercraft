query BrowseSearch($searchTerm: String! $labelIds: [ID!]!) {
    search(searchTerm: $searchTerm, labelIds: $labelIds) {
        sources {
            id
        }
        episodes {
            id
        }
        agents {
            id
        }
        letters {
            id
        }
        gifts {
            id
        }
        locations {
            id
        }
    }
}
