<ng-container *ngIf="data$ | async as data; else loading">
    <lc-breadcrumb [breadcrumbs]="makeBreadcrumbs(data)" />

    <ng-container *ngIf="data.giftDescription as gift; else noGift">
        <a
            *ngIf="gift.editable"
            class="float-end btn btn-light"
            [routerLink]="['/data-entry/gifts', gift.id]"
        >
            <lc-icon [icon]="actionIcons.edit" />
            Edit this gift
        </a>
        <lc-object-page-header [object]="gift" [icon]="dataIcons.gift" />

        <lc-contributors [contributors]="gift.contributors" />

        <section class="mt-5">
            <h2>Source text</h2>

            <div class="my-4">
                <lc-browse-list-item [listItem]="transformSource(gift.source)" />
            </div>
        </section>

        <section class="mt-5">
            <h2>Epistolary episodes</h2>

            @if (gift.episodes.length) {
                <p>This gift appears in {{gift.episodes.length}} epistolary episodes:</p>

                <div class="my-4">
                    @for (link of gift.episodes; track link.id) {
                        <lc-browse-list-item [listItem]="transformEpisode(link.episode)" />
                    }
                </div>
            } @else {
                This gift does not appear in any epistolary episodes.
            }
        </section>

    </ng-container>

    <ng-template #noGift>
        <lc-not-found entity="gift" [id]="id$ | async" />
    </ng-template>
</ng-container>

<ng-template #loading>
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</ng-template>
