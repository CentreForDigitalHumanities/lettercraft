<div class="omnibrowse-container">
    <div class="search-section">
        <div class="container">
            <form (submit)="onSearch($event)" class="search-form">
                <div class="input-group search-input-wrapper">
                    <input
                        type="text"
                        class="form-control search-input"
                        [formControl]="search"
                        name="searchQuery"
                        placeholder="Search across all entities..."
                        aria-label="Search"
                    />
                    <button class="btn btn-primary search-button" type="submit">
                        <lc-icon [icon]="actionIcons.search" class="me-2" aria-hidden="true" />
                        Search
                    </button>
                </div>

                <!-- Label Selection Dropdown -->
                <div class="label-filter-wrapper mt-3">
                    <div ngbDropdown class="dropdown-flex-container" autoClose="outside">
                        <button
                            type="button"
                            class="btn btn-outline-secondary dropdown-toggle label-dropdown-button"
                            id="labelDropdown"
                            ngbDropdownToggle>
                            <span class="me-2">{{ getSelectedLabelsDisplay() }}</span>
                        </button>
                        <div ngbDropdownMenu aria-labelledby="labelDropdown" class="label-dropdown-menu">
                            @for (label of mockLabels; track label.id) {
                                <button
                                    ngbDropdownItem
                                    type="button"
                                    class="label-dropdown-item"
                                    (click)="toggleLabel(label.id)">
                                    <span class="btn btn-tag me-2"
                                        [class]="isLabelSelected(label.id) ? 'btn-secondary' : 'btn-light'">
                                        <lc-icon [icon]="isLabelSelected(label.id) ? 'check-square' : 'square'" class="me-1" />
                                        {{ label.label }}
                                    </span>
                                </button>
                            }
                        </div>
                    </div>
                    @if (selectedLabels.length > 0) {
                        <button
                            type="button"
                            class="btn clear-labels-button"
                            (click)="clearLabels()"
                            title="Clear all labels">
                            <lc-icon [icon]="actionIcons.delete" />
                        </button>
                    }
                </div>
            </form>
        </div>
    </div>

    <div class="results-section">
        <div class="container-fluid">
            <ul ngbNav #nav="ngbNav" [(activeId)]="activeTab" class="nav-tabs mb-4">
                @for (tab of tabs; track tab.id) {
                    <li [ngbNavItem]="tab.id" class="nav-item">
                        <button ngbNavLink class="nav-link">
                            <lc-icon class="me-2" [icon]="tab.icon"></lc-icon>
                            <span>{{ tab.title }}</span>
                            <span class="badge bg-secondary ms-2">{{ getResultCount(tab.id) }}</span>
                        </button>
                        <ng-template ngbNavContent>
                            <div class="results-content">
                                <div class="list-group">
                                    @for (item of getResults(tab.id); track item.id) {
                                        <a href="#" class="list-group-item list-group-item-action">
                                            <div class="d-flex w-100 justify-content-between">
                                                <h5 class="mb-1" [innerHTML]="item.name"></h5>
                                                <small class="text-muted">
                                                    <lc-icon [icon]="item.icon ?? tab.icon" class="me-1"  />
                                                </small>
                                            </div>
                                            <p class="mb-1" [innerHTML]="item.description"></p>
                                            <small class="text-muted" [innerHTML]="item.subtext"></small>
                                        </a>
                                    }
                                </div>
                                @if (getResultCount(tab.id) === 0) {
                                    <div class="no-results text-center py-5">
                                        <lc-icon [icon]="actionIcons.search" class="text-muted mb-3" size="3x" />
                                        <p class="text-muted">No results found in this category</p>
                                    </div>
                                }
                            </div>
                        </ng-template>
                    </li>
                }
            </ul>
            <div [ngbNavOutlet]="nav"></div>
        </div>
    </div>
</div>
