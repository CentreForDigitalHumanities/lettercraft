query ViewLocation($id: ID!) {
  spaceDescription(id: $id) {
    id
    name
    description
    editable
    source {
        id
        name
        descriptionText
        episodes {
            id
        }
    }
    episodes {
      id
      episode {
        id
        name
        summary
        designators
        categories {
            id
            name
        }
        book
        chapter
        contributors {
            id
            fullName
        }
        page
        agents {
            id
            agent {
                id
                name
                isGroup
                identified
            }
        }
        gifts {
            id
            gift {
                id
                name
            }
        }
        letters {
            id
            letter {
                id
                name
            }
        }
        locations {
            id
            location {
                id
                name
                hasIdentifiableFeatures
            }
        }
      }
    }
    contributors {
      id
      fullName
    }
    hasIdentifiableFeatures
    regionFields {
      region {
        id
        name
      }
      id
      note
      sourceMention
    }
    settlementFields {
      id
      note
      sourceMention
      settlement {
        id
        name
      }
    }
    structureFields {
      sourceMention
      note
      id
      structure {
        id
        name
      }
    }
  }
}
