<ng-container *ngIf="data$ | async as data; else loading">
    <lc-breadcrumb [breadcrumbs]="makeBreadcrumbs(data)" />

    <ng-container *ngIf="data.letterDescription as letter">
        <a
            *ngIf="letter.editable"
            class="float-end btn btn-light"
            [routerLink]="['/data-entry/letters', letter.id]"
        >
            <lc-icon [icon]="actionIcons.edit" />
            Edit this letter
        </a>

        <lc-object-page-header [object]="letter" [icon]="dataIcons.letter" />

        <lc-contributors [contributors]="letter.contributors" />

        <section class="mt-5">
            <h2>Source text</h2>

            <div class="my-4">
                <lc-browse-list-item [listItem]="transformSource(letter.source)" />
            </div>
        </section>

        <section class="mt-5">
            <h2>Epistolary episodes</h2>

            @if (letter.episodes.length) {
                <p>This letter appears in {{letter.episodes.length}} epistolary episodes:</p>

                <div class="my-4">
                    @for (link of letter.episodes; track link.id) {
                        <lc-browse-list-item [listItem]="transformEpisode(link.episode)" />
                    }
                </div>
            } @else {
                This agent does not appear in any epistolary episodes.
            }
        </section>

    </ng-container>

    <ng-template #noLetter>
        <lc-not-found entity="letter" [id]="id$ | async" />
    </ng-template>
</ng-container>

<ng-template #loading>
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</ng-template>
