@let caseStudy = data();

@if (caseStudy) {
    <h2>{{caseStudy.name}}</h2>

    <p style="float: right">
        {{caseStudy.date | date:'longDate'}}
    </p>

    <p class="lead" *ngIf="caseStudy.authors.length">
        By
        <ng-container *ngFor="let author of caseStudy.authors; last as last">
            <a [routerLink]="['/contributors', author.id]" class="link-dark"
                >{{author.fullName}}</a><ng-container *ngIf="!last">, </ng-container>
        </ng-container>
    </p>


    <div class="card bg-light" *ngIf="caseStudy.sources.length">
        <div class="card-body">
            <p class="card-text">
                This is a case study based on
                <span *ngFor="let source of caseStudy.sources; last as last">
                    <a [routerLink]="['/data/sources', source.id]"
                        class="icon-link ms-1">
                        <lc-icon [icon]="dataIcons.source" />
                        {{source.name}}
                    </a>
                    <span *ngIf="!last">, </span>
                </span>
            </p>
        </div>
    </div>

    <div lcFootnotes [innerHTML]="sanitizedContent(caseStudy)"
        class="mt-4 mx-auto font-serif lh-medium extra-header-spacing"
    ></div>
}
