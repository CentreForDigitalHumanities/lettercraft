<div *ngIf="data() as data" class="my-4">
    <div *ngFor="let item of data">
        <div class="card my-3">
            <div class="card-body">
                <div class="row">
                    <h2 class="col card-title h5">
                        <a [routerLink]="['/case-studies', item.id]" class="stretched-link">{{item.name}}</a>
                        <br>
                    </h2>
                    <p class="col-auto card-text text-secondary">
                        {{item.date | date}}
                    </p>
                </div>
                <p class="card-text">{{authorNames(item)}}</p>
            </div>
        </div>
    </div>

    <div *ngIf="!data.length">
        <p>No case studies have been published yet.</p>
    </div>
</div>
