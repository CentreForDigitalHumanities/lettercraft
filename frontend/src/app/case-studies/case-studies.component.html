@let listData = listData$ | async;
@let viewData = viewData$ | async;

@if (breadcrumbs$ | async; as breadcrumbs) {
    <lc-breadcrumb [breadcrumbs]="breadcrumbs" />
}

<div class="row">
    <div class="col-md">
        <lc-case-study-view [data]="viewData" />
    </div>
    <aside class="col-md-3">
        <h2>Case studies</h2>
        @if (listData?.caseStudies; as caseStudies) {
            <lc-case-studies-list [data]="caseStudies"/>
        }
    </aside>
</div>
